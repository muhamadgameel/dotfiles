# Fuzzel configuration - TokyoNight Night theme

[main]
font=JetBrainsMono Nerd Font:size=12
dpi-aware=auto

# Sizing & layout
width=60
horizontal-pad=16
vertical-pad=12
inner-pad=12
anchor=center

# Performance & behavior
prompt="> "
icon-theme=Papirus-Dark
icons-enabled=yes
fuzzy=yes
show-actions=no
terminal=alacritty -e
layer=overlay
exit-on-keyboard-focus-loss=yes
match-counter=yes
list-executables-in-path=no

lines=16
tabs=4
letter-spacing=0.5

[colors]
# Background - TokyoNight bg (#1a1b26) with ~80% opacity for blur
background=1a1b26cc

# Text - TokyoNight foreground
text=c0caf5ff
prompt=7aa2f7ff

# Selection - TokyoNight visual selection bg, accent for text
selection=283457ff
selection-text=7aa2f7ff
selection-match=bb9af7ff

# Match highlight - TokyoNight magenta
match=bb9af7ff

# Border - TokyoNight comment/inactive
border=565f89ff

[border]
width=2
radius=12

[dmenu]
mode=text
