# TokyoNight Night palette:
#   blue:    #7aa2f7    purple:  #bb9af7
#   cyan:    #7dcfff    green:   #9ece6a
#   yellow:  #e0af68    red:     #f7768e
#   fg:      #c0caf5    comment: #565f89

add_newline = true

format = """
$username\
$hostname\
$localip\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$package\
$nodejs\
$python\
$rust\
$lua\
$golang\
$docker_context\
$sudo\
$cmd_duration\
$line_break\
$jobs\
$status\
$character"""

[line_break]
disabled = true

[character]
success_symbol = '[‚ĚĮ](bold #9ece6a)'
error_symbol = '[‚ĚĮ](bold #f7768e)'

[localip]
ssh_only = true
format = '[@$localipv4](bold #f7768e) '
disabled = false

[username]
format = '[$user]($style) '
style_user = 'bold #7aa2f7'
style_root = 'bold #f7768e'

[hostname]
format = '[$hostname]($style) '
style = 'bold #bb9af7'
ssh_only = true

[directory]
format = '[ÔĀľ $path]($style)[$read_only]($read_only_style) '
style = 'bold #7aa2f7'
read_only = ' ÔÄ£'
read_only_style = '#f7768e'
truncate_to_repo = true
truncation_symbol = '‚Ä¶/'
truncation_length = 2

[git_branch]
format = '[Óā† $branch(:$remote_branch)]($style) '
style = '#bb9af7'

[git_commit]
format = '[\($hash$tag\)]($style) '
style = '#565f89'
tag_symbol = ' ÔÄę '
only_detached = true

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = '#e0af68'

[git_metrics]
disabled = false
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
added_style = '#9ece6a'
deleted_style = '#f7768e'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = '#e0af68'
conflicted = 'ÔĀĪ '
ahead = '‚á°${count} '
behind = '‚á£${count} '
diverged = '‚áē‚á°${ahead_count}‚á£${behind_count} '
untracked = 'ÔĀ© '
stashed = 'ÔÄú '
modified = 'ÔĀÄ '
staged = 'ÔĀß '
renamed = 'ÔĀ§ '
deleted = 'ÔÄĒ '

[package]
format = '[Ôíá $version]($style) '
style = '#e0af68'

[nodejs]
format = '[Óúė $version]($style) '
style = '#9ece6a'

[python]
format = '[Óúľ $version(\($virtualenv\))]($style) '
style = '#e0af68'

[rust]
format = '[Óě® $version]($style) '
style = '#f7768e'

[lua]
format = '[Óė† $version]($style) '
style = '#7aa2f7'

[golang]
format = '[Óėß $version]($style) '
style = '#7dcfff'

[docker_context]
format = '[Óěį $context]($style) '
style = '#7dcfff'

[sudo]
disabled = false
format = '[ÔĄ≤ ]($style)'
style = 'bold #f7768e'

[cmd_duration]
format = '[ÔČí $duration]($style) '
style = '#e0af68'
min_time = 1_000

[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = 'ÔÄć '
style = '#f7768e'

[jobs]
format = '[$symbol$number]($style) '
symbol = 'ÔÄď '
style = '#7dcfff'
