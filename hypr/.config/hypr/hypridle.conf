# ║                        HYPRIDLE CONFIG                             ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Idle management daemon for Hyprland

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid multiple instances
    # before_sleep_cmd = loginctl lock-session    # lock before suspend
    # after_sleep_cmd = hyprctl dispatch dpms on  # turn on screen after resume
}

# ── Dim Screen (2 minutes) ───────────────────────────────────────────
listener {
    timeout = 120                               # 2 minutes
    on-timeout = brightnessctl -s set 10%       # dim screen
    on-resume = brightnessctl -r                # restore brightness
}

# ── Lock Screen (10 minutes) ──────────────────────────────────────────
listener {
    timeout = 600                               # 10 minutes
    on-timeout = loginctl lock-session          # lock session
}

# ── Turn Off Screen (15 minutes) ─────────────────────────────────────
listener {
    timeout = 900                               # 15 minutes
    on-timeout = hyprctl dispatch dpms off      # turn off display
    on-resume = hyprctl dispatch dpms on        # turn on display
}

# ── Suspend (30 minutes) ─────────────────────────────────────────────
