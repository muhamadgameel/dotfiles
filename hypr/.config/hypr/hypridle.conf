# ╔═══════════════════════════════════════════════════════════════════╗
# ║                        HYPRIDLE CONFIG                             ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Idle management daemon for Hyprland

general {
    lock_cmd = pidof hyprlock || hyprlock       # Avoid multiple lock instances
    before_sleep_cmd = loginctl lock-session    # Lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # Turn on screen after resume
    ignore_dbus_inhibit = false                 # Respect app inhibit requests
    ignore_systemd_inhibit = false              # Respect systemd inhibit
}

# ╔═══════════════════════════════════════════════════════════════════╗
# ║                       IDLE LISTENERS                               ║
# ╚═══════════════════════════════════════════════════════════════════╝

# ── Dim Screen (5 minutes) ───────────────────────────────────────────
listener {
    timeout = 300                               # 5 minutes
    on-timeout = brightnessctl -s set 10%       # Dim screen to 10%
    on-resume = brightnessctl -r                # Restore previous brightness
}

# ── Lock Screen (20 minutes) ─────────────────────────────────────────
listener {
    timeout = 1200                              # 20 minutes
    on-timeout = loginctl lock-session          # Lock session
}

# ── Turn Off Screen (30 minutes) ─────────────────────────────────────
listener {
    timeout = 1800                              # 30 minutes
    on-timeout = hyprctl dispatch dpms off      # Turn off display
    on-resume = hyprctl dispatch dpms on        # Turn on display
}

# ── Suspend (30 minutes) ─────────────────────────────────────────────
# Uncomment to enable auto-suspend
# listener {
#     timeout = 1800                            # 30 minutes
#     on-timeout = systemctl suspend            # Suspend system
# }