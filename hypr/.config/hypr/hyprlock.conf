# ╔═══════════════════════════════════════════════════════════════════╗
# ║                        HYPRLOCK CONFIG                             ║
# ╚═══════════════════════════════════════════════════════════════════╝

$font = JetBrainsMono Nerd Font
$accent = rgb(7aa2f7)
$accentAlpha = rgba(7aa2f7ee)
$surface = rgba(26, 27, 38, 0.9)
$text = rgb(c0caf5)
$subtext = rgb(a9b1d6)
$error = rgb(f7768e)
$success = rgb(9ece6a)

# ── General ──────────────────────────────────────────────────────────
general {
    hide_cursor = true
    grace = 3                 # seconds before requiring password
    ignore_empty_input = true
}

# ── Authentication ───────────────────────────────────────────────────
# Fingerprint (uncomment if supported)
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = 󰈷 Scan fingerprint to unlock
#         present_message = 󰈷 Scanning...
#         retry_delay = 250
#     }
# }

# ── Animations ───────────────────────────────────────────────────────
animations {
    enabled = true
    bezier = smooth, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 3, smooth
    animation = fadeOut, 1, 3, smooth
    animation = inputFieldDots, 1, 2, linear
}

# ── Background ───────────────────────────────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
}

# ── Input Field ──────────────────────────────────────────────────────
input-field {
    monitor =
    size = 350, 55
    outline_thickness = 2
    rounding = 15

    inner_color = $surface
    outer_color = $accent
    font_color = $text

    check_color = $success
    fail_color = $error
    capslock_color = rgba(250, 189, 47, 0.9)

    fade_on_empty = false
    fade_timeout = 2000

    font_family = $font
    font_size = 14
    placeholder_text = <i>  Enter Password...</i>
    fail_text = <i>$PAMFAIL</i>

    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1

    position = 0, -120
    halign = center
    valign = center
}

# ── Clock ────────────────────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    font_size = 120
    font_family = $font

    color = $text
    shadow_passes = 2
    shadow_size = 3
    shadow_boost = 1.2

    position = 0, 200
    halign = center
    valign = center
}

# ── Date ─────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_size = 24
    font_family = $font

    color = $subtext

    position = 0, 100
    halign = center
    valign = center
}

# ── User Greeting ────────────────────────────────────────────────────
label {
    monitor =
    text = Hi, $USER
    font_size = 18
    font_family = $font

    color = $subtext

    position = 0, -50
    halign = center
    valign = center
}

# ── Keyboard Layout ──────────────────────────────────────────────────
label {
    monitor =
    text = $LAYOUT[EN,AR]
    font_size = 14
    font_family = $font

    color = $subtext
    onclick = hyprctl switchxkblayout all next

    position = 0, -200
    halign = center
    valign = center
}

# ── Battery/Status (optional) ────────────────────────────────────────
label {
    monitor =
    text = cmd[update:5000] echo "$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null || echo '')%  $(date +%H:%M)"
    font_size = 12
    font_family = $font

    color = $subtext

    position = -30, 30
    halign = right
    valign = bottom
}
