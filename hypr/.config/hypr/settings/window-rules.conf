# ╔═══════════════════════════════════════════════════════════════════╗
# ║                        WINDOW RULES                                ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Format: windowrule = MATCH, RULE
# Match: match:class, match:title, match:xwayland, match:float, match:fullscreen, match:pin, match:focus

# ── Global Rules ─────────────────────────────────────────────────────
# Ignore maximize requests from apps
windowrule {
  name = suppress-maximize
  suppress_event = maximize
  match:class = .*
}

# Fix XWayland focus issues
windowrule {
  name = xwayland-nofocus
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}

# ── Floating Windows ─────────────────────────────────────────────────
# System utilities
windowrule = match:class nm-connection-editor, float on
windowrule = match:class blueman-manager, float on
windowrule = match:class org.kde.polkit-kde-authentication-agent-1, float on

# File dialogs
windowrule = match:title ^(Open File)(.*)$, float on
windowrule = match:title ^(Save File)(.*)$, float on
windowrule = match:title ^(Open Folder)(.*)$, float on
windowrule = match:title ^(Select)(.*)$, float on
windowrule = match:title ^(Open File)(.*)$, size 900 600
windowrule = match:title ^(Save File)(.*)$, size 900 600

# Image viewers
windowrule = match:class imv, float on
windowrule = match:class org.gnome.Loupe, float on

# ── Picture-in-Picture ───────────────────────────────────────────────
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, size 480 270
windowrule = match:title ^(Picture-in-Picture)$, move 100%-500 100%-290

# Firefox PiP
windowrule = match:title ^(Picture in picture)$, float on
windowrule = match:title ^(Picture in picture)$, pin on
windowrule = match:title ^(Picture in picture)$, size 480 270
windowrule = match:title ^(Picture in picture)$, move 100%-500 100%-290

# ── Application-Specific ─────────────────────────────────────────────
# Steam
windowrule = match:class steam, match:title ^(Friends List)$, float on
windowrule = match:class steam, match:title ^(Steam Settings)$, float on
windowrule {
  name = steam-stay-focused
  stay_focused = on
  match:class = steam
  match:title = ^()$
}

# Audio control (pavucontrol)
windowrule = match:class org.pulseaudio.pavucontrol, float on
windowrule = match:class org.pulseaudio.pavucontrol, size 800 600

# ── Layer Rules ──────────────────────────────────────────────────────
# Fuzzel launcher
layerrule = match:namespace launcher, blur on
layerrule = match:namespace launcher, animation slide

# ── Workspace Rules (Smart Gaps) ─────────────────────────────────────
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = match:float 0, match:workspace w[tv1], border_size 0
windowrule = match:float 0, match:workspace w[tv1], rounding 0
windowrule = match:float 0, match:workspace f[1], border_size 0
windowrule = match:float 0, match:workspace f[1], rounding 0