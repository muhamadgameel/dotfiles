# ╔═══════════════════════════════════════════════════════════════════╗
# ║                        WINDOW RULES                                ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Format: windowrule = RULE, MATCH
# Match: class:, title:, xwayland:, floating:, fullscreen:, pinned:, focus:

# ── Global Rules ─────────────────────────────────────────────────────
# Ignore maximize requests from apps
windowrule = suppressevent maximize, class:.*

# Fix XWayland focus issues
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# ── Floating Windows ─────────────────────────────────────────────────
# System utilities
windowrule = float, class:nm-connection-editor
windowrule = float, class:blueman-manager
windowrule = float, class:org.kde.polkit-kde-authentication-agent-1

# File dialogs
windowrule = float, title:^(Open File)(.*)$
windowrule = float, title:^(Save File)(.*)$
windowrule = float, title:^(Open Folder)(.*)$
windowrule = float, title:^(Select)(.*)$
windowrule = size 900 600, title:^(Open File)(.*)$
windowrule = size 900 600, title:^(Save File)(.*)$

# Image viewers
windowrule = float, class:imv
windowrule = float, class:org.gnome.Loupe

# ── Picture-in-Picture ───────────────────────────────────────────────
windowrule = float, title:^(Picture-in-Picture)$
windowrule = pin, title:^(Picture-in-Picture)$
windowrule = size 480 270, title:^(Picture-in-Picture)$
windowrule = move 100%-500 100%-290, title:^(Picture-in-Picture)$

# Firefox PiP
windowrule = float, title:^(Picture in picture)$
windowrule = pin, title:^(Picture in picture)$
windowrule = size 480 270, title:^(Picture in picture)$
windowrule = move 100%-500 100%-290, title:^(Picture in picture)$

# ── Application-Specific ─────────────────────────────────────────────
# Steam
windowrule = float, class:steam, title:^(Friends List)$
windowrule = float, class:steam, title:^(Steam Settings)$
windowrule = stayfocused, class:steam, title:^()$

# Audio control (pavucontrol)
windowrule = float, class:org.pulseaudio.pavucontrol
windowrule = size 800 600, class:org.pulseaudio.pavucontrol

# ── Layer Rules ──────────────────────────────────────────────────────
# Fuzzel launcher
layerrule = blur, launcher
layerrule = ignorezero, launcher
layerrule = animation slide, launcher

# ── Workspace Rules (Smart Gaps) ─────────────────────────────────────
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
windowrule = rounding 0, floating:0, onworkspace:w[tv1]
windowrule = bordersize 0, floating:0, onworkspace:f[1]
windowrule = rounding 0, floating:0, onworkspace:f[1]