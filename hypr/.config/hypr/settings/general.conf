# ╔═══════════════════════════════════════════════════════════════════╗
# ║                      GENERAL SETTINGS                              ║
# ╚═══════════════════════════════════════════════════════════════════╝

general {
    border_size = 2
    gaps_in = 4
    gaps_out = 8
    gaps_workspaces = 0

    col.active_border = $accent
    col.inactive_border = $inactive

    resize_on_border = true
    extend_border_grab_area = 15

    layout = dwindle

    snap {
        enabled = true
        window_gap = 10
    }
}

# ── Decoration ───────────────────────────────────────────────────────
decoration {
    rounding = 12
    rounding_power = 2

    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
        new_optimizations = true
        xray = false
        popups = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        offset = 0, 4
        color = rgba(0, 0, 0, 0.35)
        color_inactive = rgba(0, 0, 0, 0.2)
    }

    dim_inactive = false
    dim_strength = 0.15
}

# ── Miscellaneous ────────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0

    vrr = 1                           # adaptive sync (1 = on, 2 = fullscreen only)
    vfr = true                        # variable frame rate
    mouse_move_enables_dpms = true    # wake on mouse move
    key_press_enables_dpms = true     # wake on key press

    animate_manual_resizes = false
    animate_mouse_windowdragging = false

    on_focus_under_fullscreen = 2  # 0 = do nothing, 1 = send to top, 2 = unfullscreen

    initial_workspace_tracking = 1
    middle_click_paste = true
}

# ── XWayland ─────────────────────────────────────────────────────────
xwayland {
    enabled = true
    force_zero_scaling = true
}

# ── Cursor ───────────────────────────────────────────────────────────
cursor {
    inactive_timeout = 5
    hide_on_key_press = true
    hide_on_touch = true
    no_warps = false
}

# ── Render ───────────────────────────────────────────────────────────
render {
    direct_scanout = 2    # reduces latency for fullscreen apps
}

# ── Binds ────────────────────────────────────────────────────────────
binds {
    workspace_back_and_forth = true
    allow_workspace_cycles = true
    scroll_event_delay = 100
}

# ── Debug (disable in production) ────────────────────────────────────
debug {
    disable_logs = true
    disable_time = true
}
