# ╔═══════════════════════════════════════════════════════════════════╗
# ║                         ANIMATIONS                                 ║
# ╚═══════════════════════════════════════════════════════════════════╝

animations {
    enabled = true

    # ── Bezier Curves ────────────────────────────────────────────────
    # Format: bezier = name, x0, y0, x1, y1
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = smooth, 0.05, 0.9, 0.1, 1.05
    bezier = snappy, 0.4, 0, 0.2, 1

    # ── Animation Definitions ────────────────────────────────────────
    # Format: animation = name,   on/off, speed,   curve,        [style]
    # Speed: lower = faster (speed in 100ms units)

    # Global default
    animation = global           , 1     , 4    , smooth

    # Window animations
    animation = windows          , 1     , 4    , smooth      , popin 80%
    animation = windowsIn        , 1     , 4    , easeOutExpo , popin 80%
    animation = windowsOut       , 1     , 3    , easeOutQuint, popin 80%
    animation = windowsMove      , 1     , 3    , snappy

    # Fade animations
    animation = fade             , 1     , 3    , smooth
    animation = fadeIn           , 1     , 3    , easeOutExpo
    animation = fadeOut          , 1     , 2    , linear

    # Border animation
    animation = border           , 1     , 5    , easeOutQuint
    animation = borderangle      , 1     , 30   , linear       , loop

    # Workspace animations
    animation = workspaces       , 1     , 4    , easeOutExpo  , slide
    animation = specialWorkspace , 1     , 4    , easeOutExpo  , slidevert

    # Layer animations (menus, notifications, etc.)
    animation = layers           , 1     , 3    , easeOutQuint , fade
    animation = layersIn         , 1     , 3    , easeOutExpo  , fade
    animation = layersOut        , 1     , 2    , linear       , fade
}
