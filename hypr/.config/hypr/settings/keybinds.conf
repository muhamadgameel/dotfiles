# ╔═══════════════════════════════════════════════════════════════════╗
# ║                         KEYBINDINGS                                ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Bind flags: l = locked, r = release, e = repeat, n = non-consuming, m = mouse

$mainMod = SUPER

# ╔═══════════════════════════════════════════════════════════════════╗
# ║                      APPLICATION LAUNCHERS                         ║
# ╚═══════════════════════════════════════════════════════════════════╝
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, D, exec, pkill $menu || $menu
bind = $mainMod, V, exec, cliphist list | $menu -d | cliphist decode | wl-copy

# ╔═══════════════════════════════════════════════════════════════════╗
# ║                      WINDOW MANAGEMENT                             ║
# ╚═══════════════════════════════════════════════════════════════════╝
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1              # maximize (fake fullscreen)
bind = $mainMod, T, togglefloating
bind = $mainMod, C, centerwindow                     # center floating window
bind = $mainMod, J, layoutmsg, togglesplit           # dwindle

# Picture-in-picture: SUPER+X
bind = $mainMod, X, exec, hyprctl --batch "dispatch setfloating; dispatch pin; dispatch fullscreenstate 0 2; dispatch resizeactive exact 640 360"

# Force kill unresponsive window (click to kill)
bind = $mainMod CTRL, Q, exec, hyprctl kill

# ── Focus Movement ───────────────────────────────────────────────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, U, focusurgentorlast

# ── Window Movement ──────────────────────────────────────────────────
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# ── Window Resizing ──────────────────────────────────────────────────
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30

# ── Mouse Bindings ───────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ╔═══════════════════════════════════════════════════════════════════╗
# ║                         WORKSPACES                                 ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace (silently - stay on current workspace)
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Move window to workspace (and follow)
bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5
bind = $mainMod ALT, 6, movetoworkspace, 6
bind = $mainMod ALT, 7, movetoworkspace, 7
bind = $mainMod ALT, 8, movetoworkspace, 8
bind = $mainMod ALT, 9, movetoworkspace, 9
bind = $mainMod ALT, 0, movetoworkspace, 10

# Navigate workspaces with scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Navigate to previous/next workspace
bind = $mainMod, bracketleft, workspace, e-1
bind = $mainMod, bracketright, workspace, e+1

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ╔═══════════════════════════════════════════════════════════════════╗
# ║                       SCREENSHOTS                                  ║
# ╚═══════════════════════════════════════════════════════════════════╝
bind = , Print, exec, grim $(xdg-user-dir PICTURES)/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" $(xdg-user-dir PICTURES)/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim - | wl-copy

# ╔═══════════════════════════════════════════════════════════════════╗
# ║                      SYSTEM CONTROLS                               ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Lock screen
bind = $mainMod, Escape, exec, $lock

# Exit Hyprland
bind = $mainMod SHIFT, Escape, exec, uwsm stop

# ── Brightness ───────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# ── Volume Control ───────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── Media Player ─────────────────────────────────────────────────────
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop
bindl = $mainMod, XF86AudioNext, exec, playerctl position 5+
bindl = $mainMod, XF86AudioPrev, exec, playerctl position 5-

# ╔═══════════════════════════════════════════════════════════════════╗
# ║                    WINDOW GROUPS (TABBED)                          ║
# ╚═══════════════════════════════════════════════════════════════════╝
bind = $mainMod, G, togglegroup
bind = $mainMod, Tab, changegroupactive, f
bind = $mainMod SHIFT, Tab, changegroupactive, b
bind = $mainMod CTRL, G, moveoutofgroup

# ╔═══════════════════════════════════════════════════════════════════╗
# ║                       UTILITY                                      ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Color picker (requires hyprpicker)
bind = $mainMod SHIFT, C, exec, hyprpicker -a

# Cycle layout: dwindle -> master -> scrolling
bind = $mainMod, L, exec, ~/.config/hypr/scripts/cycle-layout.sh
