# ╔═══════════════════════════════════════════════════════════════════╗
# ║                         VARIABLES                                  ║
# ╚═══════════════════════════════════════════════════════════════════╝

# ── Environment Variables ────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita

# ── Application Variables ────────────────────────────────────────────
$terminal = alacritty
$fileManager = dolphin
$browser = chromium
$menu = fuzzel
$lock = hyprlock

# ── Theming ──────────────────────────────────────────────────────────
$accent = rgb(7aa2f7)
$accentAlpha = rgba(7aa2f7ee)
$inactive = rgb(565f89)
$surface = rgb(1a1b26)
