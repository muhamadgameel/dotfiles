# ╔═══════════════════════════════════════════════════════════════════╗
# ║                         INPUT SETTINGS                             ║
# ╚═══════════════════════════════════════════════════════════════════╝

input {
    # ── Keyboard ─────────────────────────────────────────────────────
    kb_layout = us,ara
    kb_options = grp:win_space_toggle
    numlock_by_default = true

    repeat_rate = 50
    repeat_delay = 300

    # ── Mouse ────────────────────────────────────────────────────────
    follow_mouse = 1              # focus follows mouse
    mouse_refocus = true
    sensitivity = 0.4             # -1.0 to 1.0, 0 = no modification
    accel_profile = adaptive     # flat or adaptive
    scroll_factor = 1.4

    # ── Touchpad ─────────────────────────────────────────────────────
    touchpad {
        disable_while_typing = true
        natural_scroll = true
        scroll_factor = 0.8
        tap-to-click = true
        tap-and-drag = true
        drag_lock = false
        middle_button_emulation = true
    }
}
# ── Gestures ─────────────────────────────────────────────────────────
gesture = 3, horizontal, workspace
