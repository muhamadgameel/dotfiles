# ╔═══════════════════════════════════════════════════════════════════╗
# ║                         MONITORS                                   ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Format: monitor = name, resolution@rate, position, scale, [transform], [vrr]
# Use `hyprctl monitors all` to list available monitors

# ╔═══════════════════════════════════════════════════════════════════╗
# ║                     DEFAULT CONFIGURATION                          ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Fallback for any unspecified monitor
monitor = , preferred, auto, 1

# ╔═══════════════════════════════════════════════════════════════════╗
# ║                      LAPTOP DISPLAY                                ║
# ╚═══════════════════════════════════════════════════════════════════╝
# High refresh rate laptop panel
monitor = eDP-1, 2560x1600@240, 0x0, 1