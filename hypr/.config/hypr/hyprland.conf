# ╔═══════════════════════════════════════════════════════════════════╗
# ║                      HYPRLAND CONFIGURATION                       ║
# ╚═══════════════════════════════════════════════════════════════════╝

# ── Source Modular Configs ───────────────────────────────────────────
source = ~/.config/hypr/settings/variables.conf
source = ~/.config/hypr/settings/monitors.conf
source = ~/.config/hypr/settings/general.conf
source = ~/.config/hypr/settings/animations.conf
source = ~/.config/hypr/settings/input.conf
source = ~/.config/hypr/settings/window-rules.conf
source = ~/.config/hypr/settings/keybinds.conf
source = ~/.config/hypr/settings/auto-start.conf

# ── Layout Configuration ─────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2        # always split to the right/bottom
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
    mfact = 0.55           # master window takes 55% of screen
}